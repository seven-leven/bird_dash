name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Lint, format, and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Install dependencies
        run: deno install --allow-scripts

      - name: Lint
        run: deno lint

      - name: Format check
        run: deno fmt --check

      - name: Build frontend
        run: deno task build:vite
