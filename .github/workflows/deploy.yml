name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger on pushes to the main branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Deno 2
      - name: Set up Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x  # Use latest Deno 2.x

      # Install esbuild
      - name: Install esbuild
        run: deno cache build.ts

      # Build the project using Deno and esbuild
      - name: Build project
        run: deno run --allow-read --allow-write --allow-net --allow-env build.ts
        env:
          PUBLIC_URL: .

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          force_orphan: true  # Ensures a clean gh-pages branch
