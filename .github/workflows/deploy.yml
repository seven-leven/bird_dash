name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── 1. Environment setup ───────────────────────────────────────────────────
  setup:
    name: Setup environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Install dependencies
        run: deno install --allow-scripts

      - name: Verify environment
        run: |
          deno --version
          echo "packages installed: $(ls node_modules | wc -l)"

  # ── 2. Asset pipeline ──────────────────────────────────────────────────────
  build-assets:
    name: Build assets
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Install dependencies
        run: deno install --allow-scripts

      - name: Run asset pipeline
        run: deno task build:assets

      - name: Verify assets
        run: |
          echo "=== public/full ==="
          ls public/full/ | head -5 || echo "(empty)"
          echo "=== public/thumb ==="
          ls public/thumb/ | head -5 || echo "(empty)"
          echo "=== public/lists ==="
          ls public/lists/ || echo "(empty)"

      - name: Upload public dir
        uses: actions/upload-artifact@v4
        with:
          name: public-assets
          path: public/
          retention-days: 1

  # ── 3. Frontend bundle ─────────────────────────────────────────────────────
  build-vite:
    name: Build frontend
    needs: build-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Install dependencies
        run: deno install --allow-scripts

      - name: Download public assets
        uses: actions/download-artifact@v4
        with:
          name: public-assets
          path: public/

      - name: Run Vite build
        run: deno task build:vite

      - name: Verify dist
        run: |
          test -f dist/index.html || { echo "Missing dist/index.html"; exit 1; }
          echo "=== dist/assets ==="
          ls -lh dist/assets/ | tail -10

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ── 4. Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Pages
    needs: build-vite
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/deploy-pages@v4