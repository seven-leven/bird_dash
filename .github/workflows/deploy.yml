name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Install dependencies
        run: deno install --allow-scripts

      - name: Build (assets + vite)
        run: deno task build
        
      - name: Show build log on failure
        if: failure()
        run: |
          echo "=== deno info ==="
          deno --version
          echo "=== directory state ==="
          ls -la scripts/ || true
          ls -la scripts/collection/ || true
          ls -la scripts/pipeline/ || true

      - name: Verify output
        run: |
          test -f dist/index.html || { echo "Missing dist/index.html"; exit 1; }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/deploy-pages@v4
