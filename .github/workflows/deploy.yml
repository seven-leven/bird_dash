name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    name: Build Assets & Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Install dependencies
        run: |
          deno install --allow-scripts
          # Verify sharp is present
          deno eval "import 'npm:sharp'; console.log('sharp OK')"

      - name: Run asset check (dry run)
        run: deno task build:assets check || true

      - name: Run full build
        run: deno task build

      - name: Verify dist folder
        run: |
          if [ ! -f dist/index.html ]; then
            echo "Missing index.html"
            ls -la dist/
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/deploy-pages@v4