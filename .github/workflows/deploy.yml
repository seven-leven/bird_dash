name: Deploy Vue App to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

# Required permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # -------------------------------
  # Build job – compiles assets + frontend
  # -------------------------------
  build:
    name: 🏗️ Build Assets & Frontend
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦕 Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: 📦 Install dependencies
        run: deno install --allow-scripts

      - name: 🔨 Run full build (assets + Vite)
        run: deno task build
        env:
          CI: true

      - name: ✅ Verify build output
        run: |
          echo "Checking dist folder contents:"
          ls -la dist/
          if [ -f "dist/index.html" ]; then
            echo "✅ Build successful – index.html found."
          else
            echo "❌ Build failed – dist/index.html missing."
            exit 1
          fi

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # -------------------------------
  # Deploy job – only if build succeeds
  # -------------------------------
  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4