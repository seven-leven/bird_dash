name: Deploy Vue App to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Modern permissions required for official Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6  # Updated from v4 to v6

      - name: Set up Deno
        uses: denoland/setup-deno@v2  # Updated from v1 to v2
        with:
          deno-version: 'v2.x'
          cache: true # Built-in caching (replaces manual actions/cache step)

      - name: Install Dependencies
        run: |
          deno install --allow-scripts
          ls -F node_modules/ || echo "WARNING: node_modules folder missing!"

      - name: Build project (Verbose)
        env:
          CI: true
          DEBUG: 'vite:*,rollup:*'
        run: |
          deno task build:vite -- --debug || {
            echo "❌ BUILD FAILED. Listing files for debugging:";
            ls -R;
            exit 1;
          }

      - name: Verify Build Artifact
        run: |
          if [ -f "./dist/index.html" ]; then
            echo "✅ Build successful."
          else
            echo "❌ Error: dist/index.html is missing."
            exit 1
          fi

      # Official Page Upload Action
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Official Page Deployment Action (No branch needed)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4